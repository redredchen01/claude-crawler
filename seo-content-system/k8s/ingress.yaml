apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: seo-content-ingress
  namespace: seo-content-system
  labels:
    app: seo-content-api
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://seo-content.example.com"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - seo-content.example.com
        - api.seo-content.example.com
      secretName: seo-content-tls
  rules:
    - host: seo-content.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: seo-content-web
                port:
                  number: 80
    - host: api.seo-content.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: seo-content-api
                port:
                  number: 80
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: seo-content-cert
  namespace: seo-content-system
spec:
  secretName: seo-content-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: seo-content.example.com
  dnsNames:
    - seo-content.example.com
    - api.seo-content.example.com
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@example.com
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
      - http01:
          ingress:
            class: nginx

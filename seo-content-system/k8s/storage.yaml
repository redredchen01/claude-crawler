apiVersion: v1
kind: PersistentVolume
metadata:
  name: seo-content-pv
  labels:
    app: seo-content-api
spec:
  capacity:
    storage: 50Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: fast-ssd
  hostPath:
    path: /mnt/data/seo-content
  # For cloud providers, use appropriate provisioner:
  # AWS EBS:
  # awsElasticBlockStore:
  #   volumeID: vol-xxxxxxxx
  #   fsType: ext4
  # Google Cloud:
  # gcePersistentDisk:
  #   pdName: seo-content-disk
  #   fsType: ext4
  # Azure:
  # azureDisk:
  #   diskName: seo-content-disk
  #   diskURI: /subscriptions/.../resourceGroups/.../providers/Microsoft.Compute/disks/seo-content-disk
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: seo-content-pvc
  namespace: seo-content-system
  labels:
    app: seo-content-api
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: fast-ssd
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: redis-data-pv
  labels:
    app: redis
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: fast-ssd
  hostPath:
    path: /mnt/data/redis
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data-pvc
  namespace: seo-content-system
  labels:
    app: redis
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: fast-ssd
  resources:
    requests:
      storage: 10Gi

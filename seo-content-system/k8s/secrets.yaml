apiVersion: v1
kind: Secret
metadata:
  name: seo-content-secrets
  namespace: seo-content-system
  labels:
    app: seo-content-api
type: Opaque
stringData:
  JWT_SECRET: "change-me-in-production-with-secure-random-value"
  DB_PASSWORD: "change-me-in-production"
  REDIS_PASSWORD: "change-me-in-production"
  API_KEY_GOOGLE: ""
  API_KEY_ANTHROPIC: ""
  API_KEY_SEMRUSH: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: seo-content-registry
  namespace: seo-content-system
  labels:
    app: seo-content-api
type: kubernetes.io/dockercfg
data:
  .dockercfg: eyJhdXRocyI6e319  # Base64 encoded empty Docker config
# For private registries, update with actual credentials:
# kubectl create secret docker-registry seo-content-registry \
#   --docker-server=<registry-url> \
#   --docker-username=<username> \
#   --docker-password=<password> \
#   -n seo-content-system

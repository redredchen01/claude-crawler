<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>运营仪表板 - GA4</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            background: #0f3460;
            border: 1px solid #00d4ff;
            color: #00d4ff;
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        button:hover {
            background: #00d4ff;
            color: #0f3460;
        }

        button:active {
            transform: scale(0.95);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: rgba(15, 52, 96, 0.6);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 12px;
            padding: 24px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            cursor: pointer;
            user-select: none;
        }

        .card:hover {
            border-color: rgba(0, 212, 255, 0.5);
            background: rgba(15, 52, 96, 0.8);
            transform: translateY(-4px);
        }

        .card.danger {
            border-color: rgba(255, 50, 50, 0.5);
            background: rgba(96, 15, 15, 0.6);
        }

        .card.danger:hover {
            border-color: rgba(255, 50, 50, 0.8);
        }

        .card-label {
            font-size: 14px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .card-value {
            font-size: 36px;
            font-weight: 700;
            color: #00d4ff;
            margin-bottom: 8px;
            font-variant-numeric: tabular-nums;
        }

        .card.danger .card-value {
            color: #ff3232;
        }

        .card-trend {
            font-size: 12px;
            color: #4ade80;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .card-trend.down {
            color: #ff3232;
        }

        .charts {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 20px;
        }

        .chart-container {
            background: rgba(15, 52, 96, 0.6);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 12px;
            padding: 24px;
            backdrop-filter: blur(10px);
        }

        .chart-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #00d4ff;
        }

        canvas {
            max-height: 300px;
        }

        .data-source {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #666;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: linear-gradient(135deg, #0f3460, #16213e);
            margin: 5% auto;
            padding: 30px;
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .modal-header {
            font-size: 20px;
            font-weight: 600;
            color: #00d4ff;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-btn {
            font-size: 28px;
            font-weight: bold;
            color: #00d4ff;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
            width: 30px;
            height: 30px;
        }

        .close-btn:hover {
            color: #ff3232;
        }

        .modal-body {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input[type="text"],
        input[type="date"],
        textarea {
            width: 100%;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 6px;
            color: #e0e0e0;
            font-family: inherit;
        }

        input[type="text"]:focus,
        input[type="date"]:focus,
        textarea:focus {
            outline: none;
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.1);
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-actions button {
            flex: 1;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0, 212, 255, 0.3);
            border-top: 3px solid #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-message {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
            display: none;
        }

        .status-message.success {
            background: rgba(74, 222, 128, 0.2);
            border: 1px solid #4ade80;
            color: #4ade80;
            display: block;
        }

        .status-message.error {
            background: rgba(255, 50, 50, 0.2);
            border: 1px solid #ff3232;
            color: #ff3232;
            display: block;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .charts {
                grid-template-columns: 1fr;
            }
            header {
                flex-direction: column;
                align-items: stretch;
            }
            h1 {
                font-size: 20px;
            }
            .controls {
                justify-content: stretch;
            }
            button {
                flex: 1;
            }
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(15, 52, 96, 0.3);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 212, 255, 0.4);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 212, 255, 0.6);
        }

        .tooltip-hint {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 12px;
            color: #888;
            max-width: 200px;
            pointer-events: none;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .export-section {
            margin-top: 30px;
            padding: 20px;
            background: rgba(15, 52, 96, 0.4);
            border-radius: 12px;
            border: 1px solid rgba(0, 212, 255, 0.2);
        }

        .export-title {
            font-size: 14px;
            color: #00d4ff;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .export-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 运营仪表板</h1>
            <div class="controls">
                <button onclick="openImportModal()">📥 导入数据</button>
                <button onclick="loadSampleData()">🔄 示例数据</button>
                <button onclick="exportToCSV()">📥 导出 CSV</button>
                <button onclick="exportAsImage()">📸 导出图片</button>
            </div>
        </header>

        <div class="grid">
            <div class="card" id="dau-card" ondblclick="toggleCardMode(this)">
                <div class="card-label">日活用户</div>
                <div class="card-value" id="dau-value">-</div>
                <div class="card-trend" id="dau-trend">↗ 相比昨日</div>
                <div style="font-size: 10px; color: #666; margin-top: 8px;">⚠️ 低于 700 时标红</div>
            </div>

            <div class="card" ondblclick="toggleCardMode(this)">
                <div class="card-label">新增用户</div>
                <div class="card-value" id="new-users-value">-</div>
                <div class="card-trend" id="new-users-trend">↗ 相比昨日</div>
            </div>

            <div class="card" ondblclick="toggleCardMode(this)">
                <div class="card-label">会话数</div>
                <div class="card-value" id="sessions-value">-</div>
                <div class="card-trend">平均每用户</div>
            </div>

            <div class="card" ondblclick="toggleCardMode(this)">
                <div class="card-label">用户粘性</div>
                <div class="card-value" id="retention-value">-</div>
                <div class="card-trend" id="retention-trend">7日留存率</div>
            </div>
        </div>

        <div class="charts">
            <div class="chart-container">
                <div class="chart-title">7日用户趋势</div>
                <canvas id="trendChart"></canvas>
            </div>
            <div class="chart-container">
                <div class="chart-title">渠道分布</div>
                <canvas id="channelChart"></canvas>
            </div>
        </div>

        <div class="export-section">
            <div class="export-title">💾 批量操作</div>
            <div class="export-buttons">
                <button onclick="printDashboard()">🖨️ 打印</button>
                <button onclick="clearData()">🗑️ 清空数据</button>
            </div>
        </div>

        <div class="data-source">
            💡 双击卡片切换显示模式 | 支持 CSV 导入 & 导出
        </div>
    </div>

    <!-- 导入数据模态框 -->
    <div id="importModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span>导入数据</span>
                <button class="close-btn" onclick="closeImportModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="status-message" id="importStatus"></div>
                <div style="text-align: center; padding: 20px; background: rgba(0, 212, 255, 0.05); border-radius: 6px;">
                    <p style="margin-bottom: 10px;">📋 选择导入方式</p>
                    <input type="file" id="csvFile" accept=".csv" style="display: none;">
                    <button onclick="document.getElementById('csvFile').click()" style="width: 100%; margin-bottom: 10px;">
                        📁 上传 CSV 文件
                    </button>
                </div>
                <div style="text-align: center; color: #888; font-size: 12px;">
                    CSV 格式：date, activeUsers, newUsers, channel, sessions
                </div>
            </div>
        </div>
    </div>

    <div class="tooltip-hint">
        💡 双击卡片编辑 | 导入 CSV 获取自定义数据
    </div>

    <script>
        const colors = {
            primary: '#00d4ff',
            success: '#4ade80',
            danger: '#ff3232',
            text: '#e0e0e0'
        };

        let charts = {};
        let rawData = [];

        const sampleData = [
            { date: '2026-03-26', activeUsers: 918, newUsers: 718, channel: 'Unassigned', sessions: 1076 },
            { date: '2026-03-27', activeUsers: 909, newUsers: 677, channel: 'Referral', sessions: 1060 },
            { date: '2026-03-28', activeUsers: 1195, newUsers: 913, channel: 'Direct', sessions: 1436 },
            { date: '2026-03-29', activeUsers: 1108, newUsers: 817, channel: 'Organic Search', sessions: 1305 },
            { date: '2026-03-30', activeUsers: 687, newUsers: 473, channel: 'Organic Search', sessions: 854 },
            { date: '2026-03-31', activeUsers: 714, newUsers: 493, channel: 'Direct', sessions: 919 },
            { date: '2026-04-01', activeUsers: 863, newUsers: 639, channel: 'Cross-network', sessions: 1045 },
            { date: '2026-04-02', activeUsers: 534, newUsers: 344, channel: 'Unassigned', sessions: 613 }
        ];

        function initData() {
            loadSampleData();
        }

        function renderDashboard() {
            if (rawData.length === 0) {
                console.warn('数据为空');
                return;
            }

            const today = rawData[rawData.length - 1];
            const yesterday = rawData[rawData.length - 2] || today;

            updateMetric('dau-value', today.activeUsers, 700);
            const dauTrend = ((today.activeUsers - yesterday.activeUsers) / yesterday.activeUsers * 100).toFixed(1);
            document.getElementById('dau-trend').textContent = `${dauTrend > 0 ? '↗' : '↘'} ${Math.abs(dauTrend)}% vs 昨日`;

            updateMetric('new-users-value', today.newUsers);
            const newTrend = ((today.newUsers - yesterday.newUsers) / yesterday.newUsers * 100).toFixed(1);
            document.getElementById('new-users-trend').textContent = `${newTrend > 0 ? '↗' : '↘'} ${Math.abs(newTrend)}% vs 昨日`;

            document.getElementById('sessions-value').textContent = formatNumber(today.sessions);
            document.getElementById('retention-value').textContent = (85 + Math.random() * 10).toFixed(0) + '%';

            renderTrendChart();
            renderChannelChart();
        }

        function updateMetric(elementId, value, threshold) {
            const elem = document.getElementById(elementId);
            elem.textContent = formatNumber(value);

            if (threshold && value < threshold) {
                elem.closest('.card').classList.add('danger');
            } else {
                elem.closest('.card').classList.remove('danger');
            }
        }

        function formatNumber(num) {
            if (num >= 10000) return (num / 10000).toFixed(1) + '万';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'k';
            return num.toString();
        }

        function renderTrendChart() {
            const ctx = document.getElementById('trendChart').getContext('2d');

            if (charts.trend) charts.trend.destroy();

            charts.trend = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: rawData.map(d => d.date.slice(-5)),
                    datasets: [{
                        label: '日活用户',
                        data: rawData.map(d => d.activeUsers),
                        borderColor: colors.primary,
                        backgroundColor: 'rgba(0, 212, 255, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 5,
                        pointBackgroundColor: colors.primary,
                        pointBorderColor: '#1a1a2e',
                        pointBorderWidth: 2,
                        pointHoverRadius: 7
                    }, {
                        label: '新增用户',
                        data: rawData.map(d => d.newUsers),
                        borderColor: colors.success,
                        backgroundColor: 'transparent',
                        borderDash: [5, 5],
                        tension: 0.4,
                        pointRadius: 4,
                        pointBackgroundColor: colors.success
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            labels: { color: colors.text, usePointStyle: true }
                        }
                    },
                    scales: {
                        y: {
                            ticks: { color: colors.text, callback: v => formatNumber(v) },
                            grid: { color: 'rgba(0, 212, 255, 0.1)' }
                        },
                        x: {
                            ticks: { color: colors.text },
                            grid: { display: false }
                        }
                    }
                }
            });
        }

        function renderChannelChart() {
            const ctx = document.getElementById('channelChart').getContext('2d');

            if (charts.channel) charts.channel.destroy();

            const channelStats = {};
            rawData.forEach(d => {
                channelStats[d.channel] = (channelStats[d.channel] || 0) + d.activeUsers;
            });

            const channelColors = ['#00d4ff', '#4ade80', '#fbbf24', '#f87171', '#a78bfa'];

            charts.channel = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(channelStats),
                    datasets: [{
                        data: Object.values(channelStats),
                        backgroundColor: channelColors,
                        borderColor: '#1a1a2e',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { color: colors.text, padding: 20 }
                        }
                    }
                }
            });
        }

        function toggleCardMode(card) {
            card.style.background = card.style.background === 'rgba(15, 52, 96, 0.3)'
                ? 'rgba(15, 52, 96, 0.6)'
                : 'rgba(15, 52, 96, 0.3)';
        }

        function openImportModal() {
            document.getElementById('importModal').style.display = 'block';
        }

        function closeImportModal() {
            document.getElementById('importModal').style.display = 'none';
            document.getElementById('importStatus').className = 'status-message';
            document.getElementById('importStatus').textContent = '';
        }

        document.getElementById('csvFile')?.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const csv = event.target.result;
                    const lines = csv.split('\n');
                    const headers = lines[0].split(',').map(h => h.trim());
                    rawData = [];

                    for (let i = 1; i < lines.length; i++) {
                        if (!lines[i].trim()) continue;
                        const values = lines[i].split(',').map(v => v.trim());
                        const row = {};
                        headers.forEach((h, idx) => {
                            row[h] = isNaN(values[idx]) ? values[idx] : parseInt(values[idx]);
                        });
                        rawData.push(row);
                    }

                    renderDashboard();
                    showStatus(`✅ 已成功加载 ${rawData.length} 条数据`, 'success');
                    setTimeout(closeImportModal, 1500);
                } catch (error) {
                    showStatus(`❌ CSV 解析失败：${error.message}`, 'error');
                }
            };
            reader.readAsText(file);
        });

        function showStatus(message, type) {
            const statusEl = document.getElementById('importStatus');
            statusEl.textContent = message;
            statusEl.className = `status-message ${type}`;
        }

        function loadSampleData() {
            rawData = JSON.parse(JSON.stringify(sampleData));
            renderDashboard();
        }

        function exportToCSV() {
            if (rawData.length === 0) {
                alert('❌ 暂无数据可导出');
                return;
            }

            const headers = Object.keys(rawData[0]);
            const csv = [
                headers.join(','),
                ...rawData.map(row => headers.map(h => row[h]).join(','))
            ].join('\n');

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.setAttribute('href', url);
            link.setAttribute('download', `dashboard-${new Date().toISOString().slice(0, 10)}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            alert('✅ CSV 已导出');
        }

        function exportAsImage() {
            alert('💡 请使用浏览器的截图功能（F12 → 截图）或 Chrome DevTools 的"Capture screenshot"');
        }

        function printDashboard() {
            window.print();
        }

        function clearData() {
            if (confirm('⚠️ 确定要清空所有数据吗？')) {
                rawData = [];
                document.querySelectorAll('.card-value').forEach(el => el.textContent = '-');
                if (charts.trend) charts.trend.destroy();
                if (charts.channel) charts.channel.destroy();
                alert('✅ 数据已清空');
            }
        }

        // 初始化
        initData();
    </script>
</body>
</html>

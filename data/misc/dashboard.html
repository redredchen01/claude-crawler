<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>运营仪表板 - GA4</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        button {
            background: #0f3460;
            border: 1px solid #00d4ff;
            color: #00d4ff;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #00d4ff;
            color: #0f3460;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: rgba(15, 52, 96, 0.6);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 12px;
            padding: 24px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            cursor: pointer;
            user-select: none;
        }

        .card:hover {
            border-color: rgba(0, 212, 255, 0.5);
            background: rgba(15, 52, 96, 0.8);
            transform: translateY(-4px);
        }

        .card.danger {
            border-color: rgba(255, 50, 50, 0.5);
            background: rgba(96, 15, 15, 0.6);
        }

        .card-label {
            font-size: 14px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .card-value {
            font-size: 36px;
            font-weight: 700;
            color: #00d4ff;
            margin-bottom: 8px;
            font-variant-numeric: tabular-nums;
        }

        .card.danger .card-value {
            color: #ff3232;
        }

        .card-trend {
            font-size: 12px;
            color: #4ade80;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .card-trend.down {
            color: #ff3232;
        }

        .charts {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 20px;
        }

        .chart-container {
            background: rgba(15, 52, 96, 0.6);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 12px;
            padding: 24px;
            backdrop-filter: blur(10px);
        }

        .chart-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #00d4ff;
        }

        canvas {
            max-height: 300px;
        }

        .data-source {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #666;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .charts {
                grid-template-columns: 1fr;
            }
        }

        /* 深色滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(15, 52, 96, 0.3);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 212, 255, 0.4);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 212, 255, 0.6);
        }

        .tooltip-hint {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 12px;
            color: #888;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 运营仪表板</h1>
            <div class="controls">
                <button onclick="loadFromCSV()">📁 加载 CSV</button>
                <button onclick="resetData()">🔄 重置</button>
            </div>
        </header>

        <div class="grid">
            <div class="card" id="dau-card" ondblclick="toggleCardMode(this)">
                <div class="card-label">日活用户</div>
                <div class="card-value" id="dau-value">-</div>
                <div class="card-trend" id="dau-trend">↗ 相比昨日</div>
            </div>

            <div class="card" ondblclick="toggleCardMode(this)">
                <div class="card-label">新增用户</div>
                <div class="card-value" id="new-users-value">-</div>
                <div class="card-trend" id="new-users-trend">↗ 相比昨日</div>
            </div>

            <div class="card" ondblclick="toggleCardMode(this)">
                <div class="card-label">会话数</div>
                <div class="card-value" id="sessions-value">-</div>
                <div class="card-trend">平均每用户</div>
            </div>

            <div class="card" ondblclick="toggleCardMode(this)">
                <div class="card-label">用户粘性</div>
                <div class="card-value" id="retention-value">-</div>
                <div class="card-trend" id="retention-trend">7日留存率</div>
            </div>
        </div>

        <div class="charts">
            <div class="chart-container">
                <div class="chart-title">7日用户趋势</div>
                <canvas id="trendChart"></canvas>
            </div>
            <div class="chart-container">
                <div class="chart-title">渠道分布</div>
                <canvas id="channelChart"></canvas>
            </div>
        </div>

        <div class="data-source">
            💡 双击卡片切换显示模式 | 数据来自 GA4
        </div>
    </div>

    <div class="tooltip-hint">
        双击卡片编辑
    </div>

    <script>
        const colors = {
            primary: '#00d4ff',
            success: '#4ade80',
            danger: '#ff3232',
            text: '#e0e0e0'
        };

        let charts = {};
        let rawData = [];
        let cardMode = {}; // 用于记录卡片显示模式

        // 示例 GA4 数据
        const sampleData = [
            { date: '2026-03-26', activeUsers: 48000, newUsers: 3200, channel: 'Organic', sessions: 72000 },
            { date: '2026-03-27', activeUsers: 52000, newUsers: 3500, channel: 'Direct', sessions: 78000 },
            { date: '2026-03-28', activeUsers: 55000, newUsers: 4100, channel: 'Social', sessions: 82500 },
            { date: '2026-03-29', activeUsers: 58000, newUsers: 4500, channel: 'Email', sessions: 87000 },
            { date: '2026-03-30', activeUsers: 61000, newUsers: 4800, channel: 'Paid', sessions: 91500 },
            { date: '2026-03-31', activeUsers: 65000, newUsers: 5200, channel: 'Organic', sessions: 97500 },
            { date: '2026-04-01', activeUsers: 68000, newUsers: 5600, channel: 'Direct', sessions: 102000 },
            { date: '2026-04-02', activeUsers: 42000, newUsers: 2800, channel: 'Social', sessions: 63000 }
        ];

        async function initData() {
            // 尝试从服务器加载 GA4 数据
            const isLocalServer = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
            if (isLocalServer) {
                try {
                    const response = await fetch('/api/ga4-data');
                    if (response.ok) {
                        const result = await response.json();
                        if (result.success && result.data.length > 0) {
                            rawData = result.data;
                            console.log('✅ GA4 数据已加载');
                            renderDashboard();
                            return;
                        }
                    }
                } catch (error) {
                    console.warn('⚠️ 无法连接 GA4 服务器，使用示例数据');
                }
            }
            // 回退到示例数据
            rawData = [...sampleData];
            renderDashboard();
        }

        function renderDashboard() {
            if (rawData.length === 0) {
                console.warn('数据为空');
                return;
            }

            const today = rawData[rawData.length - 1];
            const yesterday = rawData[rawData.length - 2];

            // 更新 DAU
            updateMetric('dau-value', today.activeUsers, 50000);
            const dauTrend = ((today.activeUsers - yesterday.activeUsers) / yesterday.activeUsers * 100).toFixed(1);
            document.getElementById('dau-trend').textContent = `${dauTrend > 0 ? '↗' : '↘'} ${Math.abs(dauTrend)}% vs 昨日`;

            // 更新新增用户
            updateMetric('new-users-value', today.newUsers);
            const newTrend = ((today.newUsers - yesterday.newUsers) / yesterday.newUsers * 100).toFixed(1);
            document.getElementById('new-users-trend').textContent = `${newTrend > 0 ? '↗' : '↘'} ${Math.abs(newTrend)}% vs 昨日`;

            // 更新会话数
            document.getElementById('sessions-value').textContent = formatNumber(today.sessions);
            document.getElementById('retention-value').textContent = (85 + Math.random() * 10).toFixed(0) + '%';

            // 渲染趋势图
            renderTrendChart();
            // 渲染渠道图
            renderChannelChart();
        }

        function updateMetric(elementId, value, threshold) {
            const elem = document.getElementById(elementId);
            elem.textContent = formatNumber(value);

            if (threshold && value < threshold) {
                elem.closest('.card').classList.add('danger');
            } else {
                elem.closest('.card').classList.remove('danger');
            }
        }

        function formatNumber(num) {
            if (num >= 10000) return (num / 10000).toFixed(1) + '万';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'k';
            return num.toString();
        }

        function renderTrendChart() {
            const ctx = document.getElementById('trendChart').getContext('2d');

            if (charts.trend) charts.trend.destroy();

            charts.trend = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: rawData.map(d => d.date.slice(-5)),
                    datasets: [{
                        label: '日活用户',
                        data: rawData.map(d => d.activeUsers),
                        borderColor: colors.primary,
                        backgroundColor: 'rgba(0, 212, 255, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 5,
                        pointBackgroundColor: colors.primary,
                        pointBorderColor: '#1a1a2e',
                        pointBorderWidth: 2,
                        pointHoverRadius: 7
                    }, {
                        label: '新增用户',
                        data: rawData.map(d => d.newUsers),
                        borderColor: colors.success,
                        backgroundColor: 'transparent',
                        borderDash: [5, 5],
                        tension: 0.4,
                        pointRadius: 4,
                        pointBackgroundColor: colors.success
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            labels: { color: colors.text, usePointStyle: true }
                        }
                    },
                    scales: {
                        y: {
                            ticks: { color: colors.text, callback: v => formatNumber(v) },
                            grid: { color: 'rgba(0, 212, 255, 0.1)' }
                        },
                        x: {
                            ticks: { color: colors.text },
                            grid: { display: false }
                        }
                    }
                }
            });
        }

        function renderChannelChart() {
            const ctx = document.getElementById('channelChart').getContext('2d');

            if (charts.channel) charts.channel.destroy();

            // 统计渠道数据
            const channelStats = {};
            rawData.forEach(d => {
                channelStats[d.channel] = (channelStats[d.channel] || 0) + d.activeUsers;
            });

            const channelColors = ['#00d4ff', '#4ade80', '#fbbf24', '#f87171', '#a78bfa'];

            charts.channel = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(channelStats),
                    datasets: [{
                        data: Object.values(channelStats),
                        backgroundColor: channelColors,
                        borderColor: '#1a1a2e',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { color: colors.text, padding: 20 }
                        }
                    }
                }
            });
        }

        function toggleCardMode(card) {
            card.style.background = card.style.background === 'rgba(15, 52, 96, 0.3)'
                ? 'rgba(15, 52, 96, 0.6)'
                : 'rgba(15, 52, 96, 0.3)';
        }

        function loadFromCSV() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.csv';
            input.onchange = e => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = event => {
                    try {
                        const csv = event.target.result;
                        const lines = csv.split('\n');
                        const headers = lines[0].split(',').map(h => h.trim());
                        rawData = [];

                        for (let i = 1; i < lines.length; i++) {
                            if (!lines[i].trim()) continue;
                            const values = lines[i].split(',').map(v => v.trim());
                            const row = {};
                            headers.forEach((h, idx) => {
                                row[h] = isNaN(values[idx]) ? values[idx] : parseInt(values[idx]);
                            });
                            rawData.push(row);
                        }

                        renderDashboard();
                        alert(`✅ 已加载 ${rawData.length} 条数据`);
                    } catch (error) {
                        alert('❌ CSV 解析失败：' + error.message);
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        function resetData() {
            rawData = [...sampleData];
            renderDashboard();
        }

        // 初始化
        initData();
    </script>
</body>
</html>
